version: "3.8"

services:
  app:
    build: .
    image: python_playground
    container_name: python_playground
    volumes:
      - ..:/workspace:cached
    command: sleep infinity
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility